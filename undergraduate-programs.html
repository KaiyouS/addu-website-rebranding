<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undergraduate Programs</title>
    <link rel="stylesheet" href="css/undergraduate-programs.css">
</head>
<body>
    <div id="clusters-container"></div>

    <script>
        // Fetch data from the JSON file
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('clusters-container');
                data.clusters.forEach(cluster => {
                    const clusterCard = `
                        <div class="cluster-card" style="background: ${cluster.gradient}">
                            <div class="logo" style="background-image: url('${cluster.logo}');"></div>
                            <div class="content">
                                <h2>${cluster.name}</h2>
                                <p>${cluster.description}</p>
                            </div>
                        </div>
                    `;
                    container.innerHTML += clusterCard;
                });
            })
            .catch(error => console.error('Error loading JSON:', error));
    </script>
</body>
</html>
